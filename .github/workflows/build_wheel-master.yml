# This is a basic workflow to help you get started with Actions

name: Build a iOS Wheel (Master)

# Controls when the workflow will run
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'pypi name'
        required: true
        type: string
      version:
        description: 'pypi version'
        required: true
        type: string
      platform:
        description: 'pypi platform (ios or android)'
        required: true
        type: string
# A workflow run is made up of one or more jobs that can run sequentially or in parallel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build Wheels
    # The type of runner that the job will run on
    #runs-on: self-hosted
    runs-on: macos-15
    permissions:
        contents: write

    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'
      #- uses: actions/setup-python@v6
      #  with:
      #    python-version: '3.14.rc3'

      # - name: install wheelbuilder
      #   run: |
      #     wget -O WheelBuilderCLI.tar.gz "https://github.com/Py-Swift/WheelBuilder/releases/latest/download/WheelBuilderCLI.tar.gz"
      #     tar -xzvf WheelBuilderCLI.tar.gz -C ./

      - name: install pkg-config
        run: brew install pkg-config

      - name: install cibuildwheel
        run: pip3.13 install cibuildwheel

      - name: install maturin
        run: pip3.13 install maturin

      - name: install rust ios targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: install android ndk
        if: github.event.inputs.platform == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: debug android env
        if: github.event.inputs.platform == 'android'
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ndk-path=${{ steps.setup-ndk.outputs.ndk-path }}"
          ls "${{ steps.setup-ndk.outputs.ndk-path }}" || true

      - name: build wheels
        run: |
          if [ "${{ github.event.inputs.platform }}" = "android" ]; then
            export ANDROID_API_LEVEL=24
            # Use the NDK installed by setup-ndk so cibuildwheel picks up the
            # correct version regardless of what the pre-installed SDK NDK provides.
            export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          fi
          mkdir -p output/wheels
          swift run WheelBuilderCLI build ${{ github.event.inputs.name }} $PWD/output/wheels --version ${{ github.event.inputs.version }} --platform ${{ github.event.inputs.platform }}

      - name: verify wheels were produced
        run: |
          echo "Wheel files in output/wheels:"
          ls output/wheels/
          WHL_COUNT=$(find output/wheels -name "*.whl" | wc -l | tr -d ' ')
          echo "Found $WHL_COUNT wheel(s)"
          if [ "$WHL_COUNT" -eq 0 ]; then
            echo "ERROR: cibuildwheel produced no .whl files — build failed."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-output
          path: ./output

  anaconda_upload:
    name: Upload to Anaconda
    needs: [build]
    uses: ./.github/workflows/anaconda-upload.yml
    secrets: inherit
      

          
