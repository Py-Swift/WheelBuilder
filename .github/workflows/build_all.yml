# This is a basic workflow to help you get started with Actions

name: Build Anaconda iOS Wheels

# Controls when the workflow will run
on:
  workflow_dispatch:
    

# A workflow run is made up of one or more jobs that can run sequentially or in parallel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build iOS Wheels
    # The type of runner that the job will run on
    #runs-on: self-hosted
    runs-on: macos-15
    permissions:
        contents: write

    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'
      #- uses: actions/setup-python@v6
      #  with:
      #    python-version: '3.14.rc3'

      - name: install cibuildwheel
        run: pip3.13 install cibuildwheel

      - name: install maturin
        run: pip3.13 install maturin
        
      - name: build wheels
        run: |
          mkdir -p output/wheels
          swift run -c release WheelBuilderCLI action-build $PWD/output/wheels
          
      - run: ls output/wheels

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-output
          path: ./output

  r2_upload:
    name: Upload to R2
    needs: [build]
    uses: ./.github/workflows/r2-upload.yml
    secrets: inherit
      

          
