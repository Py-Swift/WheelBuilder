name: Debug pydantic_core iOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'pydantic_core version'
        required: true
        default: '2.47.0'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build pydantic_core iOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: install pkg-config
        run: brew install pkg-config

      - name: install cibuildwheel + maturin
        run: |
          uv pip install cibuildwheel
          uv pip install maturin

      - name: install rust ios targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: build pydantic_core iOS wheel
        run: |
          mkdir -p output/wheels
          uv run wheelbuilder build pydantic_core $PWD/output/wheels \
            --version ${{ github.event.inputs.version }} \
            --platform ios

      - name: list output
        run: find output/wheels -name "*.whl" | sort

      - uses: actions/upload-artifact@v4
        with:
          name: pydantic_core-ios-wheels
          path: ./output/wheels
