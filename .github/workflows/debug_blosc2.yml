name: Debug blosc2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'blosc2 version'
        required: true
        default: '4.3.3'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build blosc2 Android
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: install pkg-config
        run: brew install pkg-config

      - name: install cibuildwheel
        run: uv pip install cibuildwheel

      - name: install android ndk
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28c

      - name: build blosc2 Android wheels
        run: |
          mkdir -p output/wheels
          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          export ANDROID_API_LEVEL=24
          uv run wheelbuilder build blosc2 $PWD/output/wheels \
            --version ${{ github.event.inputs.version }} \
            --platform android

      - name: list output
        run: find output/wheels -name "*.whl" | sort

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blosc2-android-wheels
          path: ./output/wheels
