name: PR - Build numpy Android wheel

on:
  pull_request:
    branches:
      - copilot/fix-numpy-android-build-issue
  push:
    branches:
      - copilot/fix-numpy-android-build-issue

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build numpy Android Wheel
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'

      - name: install pkg-config
        run: brew install pkg-config

      - name: install cibuildwheel
        run: pip3.13 install cibuildwheel

      - name: install maturin
        run: pip3.13 install maturin

      - name: install rust android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: install android ndk
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: debug android env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ndk-path=${{ steps.setup-ndk.outputs.ndk-path }}"
          ls "${{ steps.setup-ndk.outputs.ndk-path }}" || true

      - name: build numpy android wheel
        run: |
          export ANDROID_API_LEVEL=24
          export ANDROID_NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          mkdir -p output/wheels
          swift run WheelBuilderCLI build numpy $PWD/output/wheels --version 2.4.4 --platform android

      - name: verify wheels were produced
        run: |
          echo "Wheel files in output/wheels:"
          ls output/wheels/ || true
          WHL_COUNT=$(find output/wheels -name "*.whl" | wc -l | tr -d ' ')
          echo "Found $WHL_COUNT wheel(s)"
          if [ "$WHL_COUNT" -eq 0 ]; then
            echo "ERROR: cibuildwheel produced no .whl files — build failed."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: numpy-android-wheels
          path: ./output
